# Build & deploy the static Next.js export to GitHub Pages.
#
# Required repository SECRETS (Settings → Secrets and variables → Actions →
# New repository secret). These hold the public Firebase web-app config so
# the static build can inline it without committing it to the repo:
#
#   NEXT_PUBLIC_FIREBASE_API_KEY           → firebaseConfig.apiKey
#   NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN       → firebaseConfig.authDomain
#   NEXT_PUBLIC_FIREBASE_PROJECT_ID        → firebaseConfig.projectId
#   NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET    → firebaseConfig.storageBucket
#   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID → firebaseConfig.messagingSenderId
#   NEXT_PUBLIC_FIREBASE_APP_ID            → firebaseConfig.appId
#
# Optional repository VARIABLE (Settings → Secrets and variables → Actions →
# Variables tab — variables, unlike secrets, may be empty):
#
#   BASE_PATH → "/<repo-name>" for a project page at
#               https://<user>.github.io/<repo>/
#               Leave the variable UNSET (or set to empty) when deploying to a
#               user/org root repo (https://<user>.github.io/) or to a custom
#               domain — GitHub substitutes an empty string, which gives
#               root-relative asset paths.
#
# After the first successful run, the site is live at the URL shown under
# Settings → Pages.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel any in-progress deploy for the same ref so we always ship the latest
# commit and don't waste Pages build minutes.
concurrency:
  group: pages
  cancel-in-progress: true

# Permissions required by upload-pages-artifact / deploy-pages (OIDC + Pages write).
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build (static export → ./out)
        env:
          # Public Firebase web-app config — comes from repository SECRETS.
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          # BASE_PATH is a repository VARIABLE (vars.* context) so it may be
          # empty for user/org root sites or custom domains. If the variable
          # is unset, GitHub substitutes an empty string → fine for
          # https://<user>.github.io/ or a custom domain.
          # For a project page at https://<user>.github.io/<repo>/, set the
          # BASE_PATH repository variable to "/<repo>" (see DEPLOY.md).
          NEXT_PUBLIC_BASE_PATH: ${{ vars.BASE_PATH }}
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
