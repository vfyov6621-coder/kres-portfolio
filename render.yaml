# Render Blueprint — deploy the Kres portfolio to Render (free tier).
#
# HOW TO USE
#   1. Push this repo to GitHub/GitLab.
#   2. On Render: New → Blueprint → pick the repo. Render reads this file.
#   3. Deploy. The first build runs `prisma db push` (creates the SQLite
#      schema) and `next build`.
#
# IMPORTANT — EPHEMERAL FILESYSTEM ON RENDER FREE TIER
#   Render's free web services have an ephemeral filesystem: the SQLite
#   database is reset to its build-time state on every redeploy and (usually)
#   when the service spins down/up after idle.
#   Consequences:
#     - The admin account (kres / 190565) ALWAYS works: `ensureAdmin()`
#       re-creates it automatically on the first API call of every boot.
#     - Registered users and password changes are NOT persisted across
#       restarts. For persistence, upgrade to a paid Render disk, or switch
#       the Prisma datasource to a hosted DB (Turso/libSQL or Neon/Postgres
#       both have free tiers). See the notes at the bottom of this file.
#
services:
  - type: web
    name: kres-portfolio
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && mkdir -p data && npx prisma db push && npx next build
    startCommand: npx next start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.4.0
      - key: NODE_ENV
        value: production
      # Absolute path so the Prisma CLI (build) and Prisma Client (runtime)
      # resolve to the SAME file. `mkdir -p data` in buildCommand creates the
      # directory; this absolute path points into it.
      - key: DATABASE_URL
        value: file:/opt/render/project/src/data/custom.db
      # Secret used to sign session JWTs. Render generates it once and keeps
      # it stable across restarts, so existing sessions stay valid.
      - key: JWT_SECRET
        generateValue: true

# ---------------------------------------------------------------------------
# PERSISTENCE UPGRADE (optional, recommended if you want registered users to
# survive restarts). Easiest option: Turso (libSQL, SQLite-compatible).
#   1. Create a free Turso DB: https://turso.tech
#   2. Install the adapter:  bun add @prisma/adapter-libsql
#   3. In prisma/schema.prisma change the datasource:
#        provider = "libsql"
#        url      = env("TURSO_DATABASE_URL")
#        directUrl = env("TURSO_DATABASE_URL")
#      (and add `relationMode = "prisma"` if needed)
#   4. In Render envVars, replace DATABASE_URL with:
#        TURSO_DATABASE_URL = libsql://<your-db>.turso.io?authToken=<token>
#   5. Rebuild. Done — data now persists and syncs.
# ---------------------------------------------------------------------------
